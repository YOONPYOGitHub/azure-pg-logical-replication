<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 780" font-family="'Segoe UI', -apple-system, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- SOURCE Box -->
  <rect x="20" y="16" width="680" height="340" rx="12" fill="#fef9f0" stroke="#e8a735" stroke-width="2" filter="url(#shadow)"/>
  <rect x="20" y="16" width="680" height="36" rx="12" fill="#e8a735"/>
  <rect x="20" y="40" width="680" height="12" fill="#e8a735"/>
  <text x="360" y="40" text-anchor="middle" fill="white" font-weight="700" font-size="14">SOURCE (pg-old)</text>

  <!-- Application -->
  <rect x="60" y="76" width="200" height="52" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="160" y="98" text-anchor="middle" font-weight="600" fill="#334155">Application</text>
  <text x="160" y="116" text-anchor="middle" fill="#64748b" font-size="11">INSERT / UPDATE / DELETE</text>

  <!-- WAL -->
  <rect x="340" y="76" width="320" height="52" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="500" y="98" text-anchor="middle" font-weight="600" fill="#1e40af">WAL (Write-Ahead Log)</text>
  <text x="500" y="116" text-anchor="middle" fill="#3b82f6" font-size="11">wal_level = logical</text>

  <!-- App → WAL arrow -->
  <line x1="260" y1="102" x2="332" y2="102" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- No Publication notice -->
  <rect x="60" y="152" width="180" height="36" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="150" y="175" text-anchor="middle" fill="#dc2626" font-size="11" font-weight="600">Publication 없음 (불필요)</text>

  <!-- WAL → Slot arrow (direct, bypassing publication) -->
  <line x1="500" y1="128" x2="500" y2="152" stroke="#475569" stroke-width="1.5"/>
  <line x1="500" y1="152" x2="360" y2="152" stroke="#475569" stroke-width="1.5"/>
  <line x1="360" y1="152" x2="360" y2="198" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Replication Slot -->
  <rect x="140" y="206" width="440" height="56" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="360" y="228" text-anchor="middle" font-weight="600" fill="#6b21a8">Replication Slot (azpgmigslot_XXXXX_*)</text>
  <text x="360" y="248" text-anchor="middle" fill="#9333ea" font-size="11">plugin: test_decoding  |  WAL을 텍스트 형태로 디코딩</text>

  <!-- WAL Sender -->
  <rect x="140" y="290" width="440" height="52" rx="8" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="360" y="312" text-anchor="middle" font-weight="600" fill="#9f1239">WAL Sender Process</text>
  <text x="360" y="330" text-anchor="middle" fill="#e11d48" font-size="11">application_name: pgcopydb[N] follow prefetch</text>

  <!-- Slot → WAL Sender arrow -->
  <line x1="360" y1="262" x2="360" y2="282" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Network arrow -->
  <line x1="360" y1="356" x2="360" y2="400" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-blue)"/>
  <rect x="260" y="368" width="200" height="24" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="360" y="385" text-anchor="middle" fill="#2563eb" font-size="11" font-weight="600">TCP (test_decoding 출력)</text>

  <!-- Azure Migration Infrastructure Box -->
  <rect x="20" y="408" width="680" height="136" rx="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="20" y="408" width="680" height="36" rx="12" fill="#8b5cf6"/>
  <rect x="20" y="432" width="680" height="12" fill="#8b5cf6"/>
  <text x="360" y="432" text-anchor="middle" fill="white" font-weight="700" font-size="14">Azure Migration Infrastructure</text>

  <!-- pgcopydb -->
  <rect x="100" y="460" width="520" height="64" rx="8" fill="#fff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="360" y="484" text-anchor="middle" font-weight="600" fill="#5b21b6">pgcopydb (외부 프로세스)</text>
  <text x="360" y="502" text-anchor="middle" fill="#7c3aed" font-size="11">test_decoding 출력 파싱 → SQL 변환 → TARGET에 직접 적용</text>

  <!-- pgcopydb → TARGET arrow -->
  <line x1="360" y1="544" x2="360" y2="600" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-blue)"/>
  <rect x="280" y="558" width="160" height="24" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="360" y="575" text-anchor="middle" fill="#2563eb" font-size="11" font-weight="600">직접 SQL 실행</text>

  <!-- TARGET Box -->
  <rect x="20" y="608" width="680" height="156" rx="12" fill="#f0f9ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <rect x="20" y="608" width="680" height="36" rx="12" fill="#2563eb"/>
  <rect x="20" y="632" width="680" height="12" fill="#2563eb"/>
  <text x="360" y="632" text-anchor="middle" fill="white" font-weight="700" font-size="14">TARGET (pg-new)</text>

  <!-- No Subscription notice -->
  <rect x="100" y="660" width="520" height="52" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="360" y="682" text-anchor="middle" font-weight="600" fill="#334155">PostgreSQL 엔진 내부에 Subscription 없음</text>
  <text x="360" y="700" text-anchor="middle" fill="#64748b" font-size="11">pgcopydb가 외부에서 직접 SQL로 데이터 적용  |  pg_subscription에 흔적 없음</text>

  <!-- Portal info -->
  <text x="360" y="738" text-anchor="middle" fill="#64748b" font-size="11">확인: Azure Portal → Migration 상태 화면에서만 확인 가능</text>
</svg>
