<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 680" font-family="'Segoe UI', -apple-system, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- SOURCE Box -->
  <rect x="20" y="16" width="680" height="400" rx="12" fill="#fef9f0" stroke="#e8a735" stroke-width="2" filter="url(#shadow)"/>
  <rect x="20" y="16" width="680" height="36" rx="12" fill="#e8a735"/>
  <rect x="20" y="40" width="680" height="12" fill="#e8a735"/>
  <text x="360" y="40" text-anchor="middle" fill="white" font-weight="700" font-size="14">SOURCE (pg-old)</text>

  <!-- Application -->
  <rect x="60" y="76" width="200" height="52" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="160" y="98" text-anchor="middle" font-weight="600" fill="#334155">Application</text>
  <text x="160" y="116" text-anchor="middle" fill="#64748b" font-size="11">INSERT / UPDATE / DELETE</text>

  <!-- WAL -->
  <rect x="340" y="76" width="320" height="52" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="500" y="98" text-anchor="middle" font-weight="600" fill="#1e40af">WAL (Write-Ahead Log)</text>
  <text x="500" y="116" text-anchor="middle" fill="#3b82f6" font-size="11">wal_level = logical</text>

  <!-- App → WAL arrow -->
  <line x1="260" y1="102" x2="332" y2="102" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Publication -->
  <rect x="140" y="164" width="440" height="64" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="360" y="188" text-anchor="middle" font-weight="600" fill="#166534">Publication (migration_pub)</text>
  <text x="360" y="206" text-anchor="middle" fill="#16a34a" font-size="11">puballtables = true  |  pgoutput 플러그인</text>

  <!-- WAL → Publication arrow -->
  <line x1="500" y1="128" x2="500" y2="140" stroke="#475569" stroke-width="1.5"/>
  <line x1="500" y1="140" x2="360" y2="140" stroke="#475569" stroke-width="1.5"/>
  <line x1="360" y1="140" x2="360" y2="156" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Replication Slot -->
  <rect x="140" y="258" width="440" height="64" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="360" y="282" text-anchor="middle" font-weight="600" fill="#6b21a8">Replication Slot (migration_sub)</text>
  <text x="360" y="300" text-anchor="middle" fill="#9333ea" font-size="11">plugin: pgoutput  |  구독자 확인까지 WAL 보존</text>

  <!-- Publication → Slot arrow -->
  <line x1="360" y1="228" x2="360" y2="250" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- WAL Sender -->
  <rect x="140" y="352" width="440" height="52" rx="8" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="360" y="374" text-anchor="middle" font-weight="600" fill="#9f1239">WAL Sender Process</text>
  <text x="360" y="392" text-anchor="middle" fill="#e11d48" font-size="11">application_name: migration_sub  |  state: streaming</text>

  <!-- Slot → WAL Sender arrow -->
  <line x1="360" y1="322" x2="360" y2="344" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Network arrow -->
  <line x1="360" y1="416" x2="360" y2="480" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-blue)"/>
  <rect x="270" y="436" width="180" height="24" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="360" y="453" text-anchor="middle" fill="#2563eb" font-size="11" font-weight="600">TCP (pgoutput 프로토콜)</text>

  <!-- TARGET Box -->
  <rect x="20" y="488" width="680" height="172" rx="12" fill="#f0f9ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <rect x="20" y="488" width="680" height="36" rx="12" fill="#2563eb"/>
  <rect x="20" y="512" width="680" height="12" fill="#2563eb"/>
  <text x="360" y="512" text-anchor="middle" fill="white" font-weight="700" font-size="14">TARGET (pg-new)</text>

  <!-- Subscription -->
  <rect x="100" y="540" width="520" height="52" rx="8" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="360" y="562" text-anchor="middle" font-weight="600" fill="#3730a3">Subscription (migration_sub)</text>
  <text x="360" y="580" text-anchor="middle" fill="#6366f1" font-size="11">PostgreSQL 내장 Apply Worker  |  수신 → 로컬 테이블 적용</text>

  <!-- Catalog info -->
  <text x="360" y="616" text-anchor="middle" fill="#64748b" font-size="11">확인: pg_subscription, pg_stat_subscription</text>

  <!-- Confirm arrow (right side, going up) -->
  <line x1="640" y1="540" x2="640" y2="404" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="648" y="474" fill="#16a34a" font-size="10" transform="rotate(-90,648,474)">confirmed_flush_lsn</text>
</svg>
